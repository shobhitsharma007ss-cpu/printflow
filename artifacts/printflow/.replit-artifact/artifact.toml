kind = "web"
previewPath = "/"
title = "PrintFlow"
version = "1.0.0"
id = "artifacts/printflow"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19755

[services.development]
run = "pnpm --filter @workspace/printflow run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/printflow", "run", "build" ]
publicDir = "artifacts/printflow/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19755"
BASE_PATH = "/"
